<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>深夜パン / Cinematic Interactive Prototype</title>
  <style>
    :root {
      --safe-x: clamp(18px, 2vw, 28px);
      --safe-y: clamp(18px, 2vw, 26px);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(45,55,72,0.28), transparent 38%),
        linear-gradient(180deg, #0a0c11 0%, #050608 100%);
      color: rgba(255,255,255,0.96);
      font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans", "Hiragino Kaku Gothic ProN", sans-serif;
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }

    .app-shell {
      width: min(100%, 1280px);
      display: grid;
      gap: 14px;
    }

    .top-meta {
      display: none;
    }

    .player-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 16 / 9;
      overflow: hidden;
      border-radius: 30px;
      background: #000;
      box-shadow: 0 24px 80px rgba(0,0,0,0.45);
      border: 1px solid rgba(255,255,255,0.08);
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: #000;
    }

    .cinematic-vignette,
    .cinematic-top,
    .cinematic-bottom {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .cinematic-vignette {
      background: radial-gradient(circle at center, transparent 52%, rgba(0,0,0,0.28) 100%);
      z-index: 1;
    }

    .cinematic-top {
      background: linear-gradient(180deg, rgba(0,0,0,0.35), rgba(0,0,0,0.08) 28%, transparent 54%);
      z-index: 2;
    }

    .cinematic-bottom {
      background: linear-gradient(180deg, transparent 20%, rgba(0,0,0,0.08) 46%, rgba(0,0,0,0.72) 100%);
      z-index: 2;
    }

    .hud {
      position: absolute;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    .bottom-zone {
      position: absolute;
      left: var(--safe-x);
      right: var(--safe-x);
      bottom: var(--safe-y);
      display: grid;
      gap: 16px;
      align-items: end;
    }

    .choice-stage {
      width: min(100%, 920px);
      margin-left: auto;
      margin-right: auto;
      display: grid;
      gap: 12px;
      pointer-events: auto;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .35s ease, transform .35s ease;
    }

    .choice-stage.show {
      opacity: 1;
      transform: translateY(0);
    }

    .choice-head {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
      flex-wrap: wrap;
    }

    .choice-caption {
      display: none;
    }

    .choice-status {
      font-size: 13px;
      color: rgba(255,255,255,0.82);
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(12px);
    }

    .choices {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .choice-btn {
      appearance: none;
      width: 100%;
      border: 1px solid rgba(255,255,255,0.12);
      background: linear-gradient(180deg, rgba(20,24,30,0.76), rgba(10,12,16,0.82));
      color: #fff;
      padding: 18px 18px 18px;
      border-radius: 18px;
      text-align: left;
      cursor: pointer;
      backdrop-filter: blur(14px);
      transition: transform .18s ease, border-color .18s ease, background .18s ease, box-shadow .18s ease, opacity .18s ease;
      box-shadow: 0 14px 28px rgba(0,0,0,0.22);
      min-height: 88px;
      display: grid;
      gap: 6px;
      position: relative;
      overflow: hidden;
    }

    .choice-btn::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(255,255,255,0.08), transparent 32%, transparent 68%, rgba(255,255,255,0.05));
      opacity: .5;
      pointer-events: none;
    }

    .choice-btn:hover {
      transform: translateY(-3px);
      border-color: rgba(255,255,255,0.28);
      background: linear-gradient(180deg, rgba(28,34,42,0.88), rgba(12,15,20,0.88));
      box-shadow: 0 18px 34px rgba(0,0,0,0.3);
    }

    .choice-btn.selected {
      border-color: rgba(255,255,255,0.52);
      background: linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.08));
      box-shadow: 0 22px 40px rgba(0,0,0,0.34);
    }

    .choice-btn.dimmed {
      opacity: 0.72;
    }

    .choice-index {
      font-size: 11px;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.54);
    }

    .choice-label {
      font-size: clamp(16px, 1.2vw, 19px);
      line-height: 1.45;
      color: rgba(255,255,255,0.98);
      font-weight: 600;
    }

    .choice-note {
      font-size: 12px;
      color: rgba(255,255,255,0.6);
    }

    .end-text-overlay {
      position: absolute;
      left: 50%;
      bottom: clamp(30px, 7vh, 72px);
      transform: translateX(-50%) translateY(10px);
      width: min(calc(100% - 40px), 900px);
      padding: 20px 22px;
      border-radius: 20px;
      text-align: center;
      background: linear-gradient(180deg, rgba(10,12,16,0.18), rgba(10,12,16,0.58));
      border: 1px solid rgba(255,255,255,0.1);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 40px rgba(0,0,0,0.24);
      opacity: 0;
      transition: opacity .45s ease, transform .45s ease;
      pointer-events: none;
      z-index: 18;
    }

    .end-text-overlay.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .end-text-overlay.clear {
      background: linear-gradient(180deg, rgba(255,247,214,0.3), rgba(120,84,0,0.34));
      border: 1px solid rgba(233, 192, 76, 0.34);
      box-shadow: 0 18px 56px rgba(129, 90, 0, 0.22);
    }

    .end-text-label {
      margin: 0 0 8px;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.56);
    }

    .end-text-overlay.clear .end-text-label {
      color: rgba(255, 234, 173, 0.88);
    }

    .end-text-main {
      margin: 0;
      font-size: clamp(28px, 3vw, 46px);
      line-height: 1.15;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: rgba(255,255,255,0.98);
      text-shadow: 0 10px 24px rgba(0,0,0,0.28);
    }

    .end-text-overlay.clear .end-text-main {
      color: #fff7d6;
      text-shadow: 0 12px 28px rgba(96, 64, 0, 0.34);
    }

    .center-screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(180deg, rgba(0,0,0,0.42), rgba(0,0,0,0.65));
      backdrop-filter: blur(10px);
      z-index: 20;
    }

    .center-card {
      width: min(100%, 760px);
      padding: clamp(26px, 3vw, 40px);
      border-radius: 28px;
      background: linear-gradient(180deg, rgba(14,17,22,0.86), rgba(8,10,14,0.9));
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 24px 60px rgba(0,0,0,0.36);
      text-align: center;
    }

    .card-kicker {
      margin: 0 0 10px;
      font-size: 12px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.52);
    }

    .center-card h1 {
      margin: 0;
      font-size: clamp(30px, 3.2vw, 52px);
      line-height: 1.04;
      letter-spacing: -0.02em;
    }

    .center-card p {
      margin: 16px 0 0;
      font-size: clamp(15px, 1.2vw, 18px);
      line-height: 1.9;
      color: rgba(255,255,255,0.78);
      text-wrap: pretty;
    }

    .start-btn,
    .replay-btn {
      appearance: none;
      margin-top: 26px;
      border: 1px solid rgba(255,255,255,0.18);
      background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(220,224,228,0.92));
      color: #050608;
      padding: 15px 24px;
      border-radius: 999px;
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 16px 28px rgba(0,0,0,0.18);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .start-btn:hover,
    .replay-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 34px rgba(0,0,0,0.22);
    }

    .replay-screen {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(180deg, rgba(0,0,0,0.16), rgba(0,0,0,0.44));
      z-index: 19;
      pointer-events: auto;
      opacity: 0;
      transition: opacity .35s ease;
    }

    .replay-screen.show {
      opacity: 1;
    }

    .replay-card {
      width: min(100%, 420px);
      padding: 26px;
      border-radius: 24px;
      background: linear-gradient(180deg, rgba(14,17,22,0.8), rgba(8,10,14,0.84));
      border: 1px solid rgba(255,255,255,0.1);
      box-shadow: 0 18px 50px rgba(0,0,0,0.28);
      text-align: center;
    }

    .replay-card p {
      margin: 0;
      color: rgba(255,255,255,0.82);
      line-height: 1.8;
    }

    @media (max-width: 860px) {
      body { padding: 0; }
      .app-shell { gap: 0; width: 100%; }
      .player-wrap { border-radius: 0; min-height: 100vh; aspect-ratio: auto; }
      .choices { grid-template-columns: 1fr; }
      .choice-head { justify-content: center; }
      .bottom-zone { gap: 14px; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <div class="player-wrap">
      <video id="video" playsinline preload="metadata"></video>

      <div class="cinematic-vignette"></div>
      <div class="cinematic-top"></div>
      <div class="cinematic-bottom"></div>

      <div class="hud">
        <div class="bottom-zone">
          <div id="choiceStage" class="choice-stage">
            <div class="choice-head">
              <div id="choiceStatus" class="choice-status">未選択 / 動画終了時に遷移</div>
            </div>
            <div id="choices" class="choices"></div>
          </div>
        </div>
      </div>

      <div id="endTextOverlay" class="end-text-overlay">
        <p class="end-text-label">Ending</p>
        <p id="endTextMain" class="end-text-main"></p>
      </div>

      <div id="replayScreen" class="replay-screen">
        <div class="replay-card">
          <p>再生が終了しました。</p>
          <button id="restartBtn" class="replay-btn">最初から見る</button>
        </div>
      </div>

      <div id="startScreen" class="center-screen">
        <div class="center-card">
          <p class="card-kicker">Interactive Branching Cinema</p>
          <h1>深夜パン</h1>
          <p>
            映像の途中に訪れる選択を正しく選び、深夜にパンを食らえ！<br>
            選択肢は動画終了の5秒前に現れ、選択後も映像は流れ続けます。
          </p>
          <button id="startBtn" class="start-btn">Start Experience</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const story = {
      start: {
        title: "深夜パン",
        src: "videos/OP.mp4",
        choices: [
          { label: "左に曲がる", note: "細い道へ入っていく。", next: "left" },
          { label: "右に曲がる", note: "明るい通りの方へ向かう。", next: "right" }
        ]
      },
      left: {
        title: "左ルート",
        src: "videos/left.mp4",
        choices: [
          { label: "真っ直ぐ進む", note: "迷わずそのまま進む。", next: "left_straight_end" },
          { label: "路地に入る", note: "気になる細道へ曲がる。", next: "left_right" }
        ]
      },
      left_right: {
        title: "左ルート / 路地",
        src: "videos/left_right.mp4",
        choices: [
          { label: "奥へ進む", note: "暗がりのさらに奥へ。", next: "left_right_straight_end" },
          { label: "右の店舗に入る", note: "明かりのついた店へ飛び込む。", next: "left_right_right_end" }
        ]
      },
      right: {
        title: "右ルート",
        src: "videos/right.mp4",
        choices: [
          { label: "横断歩道を進む", note: "そのまま向こう側へ渡る。", next: "right_straight_end" },
          { label: "右に曲がる", note: "さらに右へ折れてみる。", next: "right_right_end" }
        ]
      },
      left_straight_end: {
        title: "END 1",
        src: "videos/left_straight_end.mp4",
        end: true,
        endTitle: "現在時刻23:04。ちょっと遅かったね。"
      },
      left_right_straight_end: {
        title: "END 2",
        src: "videos/left_right_straight_end.mp4",
        end: true,
        endTitle: "clear!!!　チーズ蒸しパンゲット"
      },
      left_right_right_end: {
        title: "END 3",
        src: "videos/left_right_right_end.mp4",
        end: true,
        endTitle: "ありませんでした。"
      },
      right_straight_end: {
        title: "END 4",
        src: "videos/right_straight_end.mp4",
        end: true,
        endTitle: "ありませんでした。"
      },
      right_right_end: {
        title: "END 5",
        src: "videos/right_right_end.mp4",
        end: true,
        endTitle: "ありませんでした。"
      }
    };

    const video = document.getElementById('video');
    const choiceStage = document.getElementById('choiceStage');
    const choicesEl = document.getElementById('choices');
    const choiceStatus = document.getElementById('choiceStatus');
    const endTextOverlay = document.getElementById('endTextOverlay');
    const endTextMain = document.getElementById('endTextMain');
    const replayScreen = document.getElementById('replayScreen');
    const startScreen = document.getElementById('startScreen');
    const startBtn = document.getElementById('startBtn');
    const restartBtn = document.getElementById('restartBtn');

    let currentSceneKey = 'start';
    let choiceShown = false;
    let selectedNextScene = null;
    let selectedLabel = null;
    let sceneFinished = false;
    let endTextShown = false;

    function resetChoiceStatus() {
      choiceStatus.textContent = '未選択 / 動画終了時に遷移';
    }

    function clearChoices() {
      choicesEl.innerHTML = '';
      choiceStage.classList.remove('show');
    }

    function hideEndText() {
      endTextOverlay.classList.remove('show', 'clear');
      endTextMain.textContent = '';
      endTextShown = false;
    }

    function showEndText(scene) {
      if (!scene?.endTitle || endTextShown) return;
      endTextShown = true;
      endTextMain.textContent = scene.endTitle;
      endTextOverlay.classList.toggle('clear', (scene.endTitle || '').includes('clear'));
      endTextOverlay.classList.add('show');
    }

    function updateChoiceButtonState() {
      const buttons = Array.from(choicesEl.querySelectorAll('.choice-btn'));
      buttons.forEach((btn) => {
        const isSelected = btn.dataset.next === selectedNextScene;
        btn.classList.toggle('selected', isSelected);
        btn.classList.toggle('dimmed', !!selectedNextScene && !isSelected);
      });
    }

    function showChoices(scene) {
      if (!scene.choices || choiceShown) return;
      choiceShown = true;
      choicesEl.innerHTML = '';

      scene.choices.forEach((choice, index) => {
        const btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.dataset.next = choice.next;
        btn.innerHTML = `
          <div class="choice-index">Choice ${String(index + 1).padStart(2, '0')}</div>
          <div class="choice-label">${choice.label}</div>
          <div class="choice-note">${choice.note || ''}</div>
        `;

        btn.addEventListener('click', () => {
          selectedNextScene = choice.next;
          selectedLabel = choice.label;
          choiceStatus.textContent = `選択済み / 「${choice.label}」で予約中`;
          updateChoiceButtonState();

          if (sceneFinished && selectedNextScene) {
            loadScene(selectedNextScene);
          }
        });

        choicesEl.appendChild(btn);
      });

      updateChoiceButtonState();
      choiceStage.classList.add('show');
    }

    function showReplay() {
      replayScreen.classList.add('show');
      replayScreen.style.pointerEvents = 'auto';
    }

    function hideReplay() {
      replayScreen.classList.remove('show');
      replayScreen.style.pointerEvents = 'none';
    }

    function finalizeScene() {
      const scene = story[currentSceneKey];
      if (!scene || sceneFinished) return;
      sceneFinished = true;

      if (scene.end) {
        showReplay();
        return;
      }

      if (selectedNextScene) {
        loadScene(selectedNextScene);
        return;
      }

      if (scene.choices?.length) {
        choiceStatus.textContent = '未選択 / 選ぶまでこの場面で待機';
        choiceStage.classList.add('show');
      }
    }

    function loadScene(sceneKey) {
      const scene = story[sceneKey];
      if (!scene) return;

      currentSceneKey = sceneKey;
      choiceShown = false;
      selectedNextScene = null;
      selectedLabel = null;
      sceneFinished = false;
      clearChoices();
      resetChoiceStatus();
      hideEndText();
      hideReplay();

      video.src = `videos/${scene.src.split('/').pop()}`;
      video.currentTime = 0;
      video.play().catch(() => {});
    }

    video.addEventListener('ended', finalizeScene);

    video.addEventListener('timeupdate', () => {
      const scene = story[currentSceneKey];
      if (!scene) return;

      const remaining = video.duration - video.currentTime;

      if (
        scene.end &&
        Number.isFinite(video.duration) &&
        video.duration > 0 &&
        remaining <= 7
      ) {
        showEndText(scene);
      }

      if (
        scene.choices &&
        Number.isFinite(video.duration) &&
        video.duration > 0 &&
        remaining <= 5
      ) {
        showChoices(scene);
      }

      if (
        Number.isFinite(video.duration) &&
        video.duration > 0 &&
        remaining <= 0.1
      ) {
        finalizeScene();
      }
    });

    startBtn.addEventListener('click', () => {
      startScreen.style.display = 'none';
      loadScene('start');
    });

    restartBtn.addEventListener('click', () => {
      loadScene('start');
    });

    hideReplay();
  </script>
</body>
</html>
